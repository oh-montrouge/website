        - desc: Admin can invite a new musician to the platform via a one-time link; the musician follows it to complete account setup and gain access.
          done_when: 'All story acceptance criteria pass for CAP-001: an admin can view the invite link for a pending account and regenerate it; a musician can open the invite link, see the setup form, submit it, and have the account transition to active; expired and already-used invite links display an informative message.'
