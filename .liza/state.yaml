        - time: 2026-04-12T14:51:35.330720289Z
          event: rejected
          agent: epic-plan-reviewer-1
          reason: |-
            ---
            Blockers: 1
            - specs/plans/EP-002.md lines 86, 91 — CAP-001 restricts admin role grant to `active` accounts only, contradicting spec and the epic's own assumption
              Why it matters: The vision states "Admin can grant or revoke the admin role on **any** account." The information model places no status restriction on role assignment. The epic's own ASM-000-2 (HIGH confidence) states "A pending account can hold the admin role (set by an admin before the account is activated)." The last-admin protection spec explicitly lists "Deleting a pending admin account" as a blocked operation, which is only meaningful if pending accounts can hold the admin role. The capability description ("an admin can grant the admin role to an active account") and the sole grant story ("Admin grants the admin role to an active musician account") together ensure a Story Writer will implement grant for active accounts only — silently skipping the pending account scenario. ASM-000-2 becomes unreachable: if grant is restricted to active accounts only, no pending account can ever hold the admin role, which makes the assumption self-contradictory.
              Suggestion: Change "an admin can grant the admin role to an active account" to "an admin can grant the admin role to any account (pending or active)" in the capability description. Add a story document: "Admin grants the admin role to a pending musician account." Update the output[] DoneWhen for EP-002 CAP-001 to reflect any-account grant. The revoke and last-admin protection stories are unaffected.

            Concerns: 2
            - specs/plans/EP-001.md (CAP-001 References) — Route path inconsistency between two referenced specs: specs/technical-specs/01-auth-and-security.md lists `/invite/:token` while specs/technical-specs/04-routing.md lists `/invitation/{token}`. The epic correctly follows the routing spec's `/invitation/{token}`, but Story Writers consulting both referenced sources will encounter conflicting paths. Suggest adding a note in the CAP-001 References or an Open Question flagging that the auth-security spec's Public Routes table uses a different token path than the routing spec; the routing spec is authoritative.
            - output[] DependsOn values — All non-null DependsOn entries show ["1"] which does not map to any valid capability ID, plan_ref, or output index. EP-001 CAP-002 shows null DependsOn despite the epic stating it depends on CAP-001. These values are inconsistent with the dependency relationships declared in the epic documents and could confuse downstream agents that use the dependency graph for ordering. Suggest correcting DependsOn to use the capability's plan_ref path or a consistent identifier matching the epic section anchors.

            Overall: Both epics are well-structured — personas are clear, completion criteria are falsifiable, scope boundaries are clean, and assumptions trace to source material. One material blocker must be resolved in EP-002 CAP-001: the "active accounts only" restriction on admin role grant contradicts both the vision spec and the epic's own HIGH-confidence assumption ASM-000-2.
            ---
        - time: 2026-04-12T14:51:35.391091265Z
          event: reclaimed_after_rejection
          agent: epic-planner-1
