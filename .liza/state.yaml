        - desc: Musicians and admins can log in with their email and password, maintain a persistent session across requests, and log out, with unauthorized access to protected routes blocked.
          done_when: 'All story acceptance criteria pass for CAP-002: an active account can log in and a session is created; pending and anonymized accounts are rejected at login; unauthenticated access to a protected route redirects to the login page; logout destroys the session; the bootstrap CLI creates the first admin account; the emergency recovery CLI resets admin credentials.'
          scope: 'Login form, session creation (server-side, 7-day rolling), session cookie flags (HttpOnly/Secure/SameSite=Strict), logout, protected-route middleware (RequireActiveAccount), bootstrap CLI for first admin, emergency admin recovery CLI. Excludes: session invalidation on anonymization (ep-4 scope), admin role verification on admin routes (EP-002 CAP-001).'
          spec_ref: /home/henry/workspace/ohm-website/specs/goals/vision.md
          plan_ref: specs/plans/EP-001.md#capability-cap-002---login-logout-and-session-management
        - desc: Admin can generate a one-time password-reset link for an active account; the musician follows it to set a new password.
          done_when: 'All story acceptance criteria pass for CAP-003: an admin can generate and regenerate a password-reset link for an active account; a musician can follow the reset link, submit a new password, and authenticate with it; expired and used reset links display an informative message; password reset is blocked for pending and anonymized accounts.'
          scope: 'Password-reset token generation and display in admin UI, reset link regeneration (invalidates existing token), password reset form, password hash update (Argon2id), 7-day token expiry, used/expired link handling, state restriction (active accounts only). Excludes: self-service reset (no email infrastructure), emergency admin recovery CLI (EP-001 CAP-002).'
          spec_ref: /home/henry/workspace/ohm-website/specs/goals/vision.md
          plan_ref: specs/plans/EP-001.md#capability-cap-003---password-reset
          depends_on:
