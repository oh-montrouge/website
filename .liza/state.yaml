        - desc: Admin can grant or revoke the admin role on any account, with the system blocking any operation that would leave the association without a remaining active admin.
          done_when: 'All story acceptance criteria pass for CAP-001: an admin can grant the admin role to any account (pending or active); an admin can revoke the admin role; the system rejects revocation when the target is the sole remaining active admin with an informative message; admin role is re-verified from the database on every request to admin routes.'
          scope: 'Grant admin role to any account (pending or active), revoke admin role, last-admin protection check for role revocation (counts only active accounts holding the admin role), per-request database role verification for all admin routes (RequireAdmin middleware). Excludes: last-admin protection during account anonymization (ep-4 scope), last-admin protection during pending account deletion (ep-2 scope), additional role types beyond admin.'
          spec_ref: /home/henry/workspace/ohm-website/specs/goals/vision.md
