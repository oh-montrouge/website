[settings]
experimental = true

[env]
DEPLOY_HOST = "debian@162.19.137.193"
IMAGE_REPO = "ghcr.io/oh-montrouge/website"

[tools]
go = "1.26.2"
"go:github.com/gobuffalo/cli/cmd/buffalo" = "v0.18.14"
"go:github.com/gobuffalo/buffalo-pop/v3" = "v3.0.7"
lefthook = "2.1.5"
golangci-lint = "2.11.4"
node = {version = "latest", postinstall = "npm install -g jscpd"}

[deps.lefthook]
auto = true
sources = ["lefthook.yml"]
outputs = [".git/hooks/pre-commit"]
run = "lefthook install"
description = "Register git pre-commit hooks — reruns automatically when lefthook.yml changes"

[[hooks.postinstall]]
script = "mise deps"

[tasks."dev:start"]
description = "Start local environment (postgres in Docker + buffalo dev)"
dir = "webapp"
run = "docker compose up -d --wait postgres && buffalo pop migrate --path ../db/migrations && buffalo dev"

[tasks."dev:stop"]
description = "Stop the local development environment (postgres + buffalo dev)"
dir = "webapp"
run = """
docker compose stop
pkill -f ohm-build || true
"""

[tasks."dev:kill"]
description = "Stop the local development environment (postgres + buffalo dev)"
dir = "webapp"
run = """
docker compose down -v
pkill -f ohm-build || true
"""

[tasks.hash-password]
description = "Generate an argon2id hash for a plaintext password — usage: mise run hash-password -- <password>"
dir = "scripts/hash-password"
run = "go run main.go $@"

[tasks."dev:seed-db"]
description = """
Populate dev DB with dummy data (local only). Idempotent — truncates and re-seeds on each run.
Default password for all accounts: devpassword
"""
dir = "webapp"
run = """
#!/usr/bin/env bash
for f in ../db/dummy-data/*.sql; do
  docker compose exec -T postgres psql -U ohm ohm_development < "$f"
done
"""

[tasks.test]
description = "Run test suite — Docker daemon must be running (testcontainers manages its own postgres)"
dir = "webapp"
usage = 'flag "--coverage" help="Generate a coverage profile to coverage.out"'
run = """
#!/usr/bin/env bash
COVER=""
if [[ "${usage_coverage:-false}" == "true" ]]; then
  COVER="-cover -coverprofile=../coverage.out"
fi
GO_ENV=test go test -race $COVER ./...
"""

[tasks.lint]
description = "Run full linter suite"
dir = "webapp"
run = "golangci-lint run ./..."

[tasks."prod:publish"]
description = "Build and push production Docker image — requires IMAGE_REPO in shell profile"
run = """
SHA=$(git rev-parse --short HEAD)
docker build -t "${IMAGE_REPO}:latest" -t "${IMAGE_REPO}:${SHA}" .
docker push "${IMAGE_REPO}:latest"
docker push "${IMAGE_REPO}:${SHA}"
echo "Published: ${IMAGE_REPO}:${SHA}"
"""

[tasks."prod:deploy"]
description = "Deploy to production VPS via SSH — requires DEPLOY_HOST in shell profile"
run = "ssh $DEPLOY_HOST 'cd /srv/ohm && git pull && docker compose pull && docker compose run --rm app buffalo-pop pop migrate --path db/migrations && docker compose up -d'"

[tasks."prod:seed-admin"]
description = "Bootstrap first admin account in production — set ADMIN_EMAIL and ADMIN_PASSWORD in mise.local.toml"
run = """
HASH=$(cd scripts/hash-password && go run main.go "$ADMIN_PASSWORD")
SAFE_EMAIL=$(printf '%s' "$ADMIN_EMAIL" | sed "s/'/''/g")
TMPFILE=$(mktemp /tmp/seed-admin.XXXX.sql)
cat > "$TMPFILE" <<ENDSQL
DO \\$seed\\$
DECLARE
  v_instrument_id BIGINT;
  v_role_id       BIGINT;
  v_account_id    BIGINT;
BEGIN
  SELECT id INTO v_instrument_id FROM instruments ORDER BY id LIMIT 1;
  SELECT id INTO v_role_id FROM roles WHERE name = 'admin';
  INSERT INTO accounts (email, password_hash, main_instrument_id, status)
    VALUES ('$SAFE_EMAIL', '$HASH', v_instrument_id, 'active')
    RETURNING id INTO v_account_id;
  INSERT INTO account_roles (account_id, role_id) VALUES (v_account_id, v_role_id);
  RAISE NOTICE 'Admin account created: %', '$SAFE_EMAIL';
END
\\$seed\\$;
ENDSQL
scp "$TMPFILE" "$DEPLOY_HOST:/tmp/seed-admin.sql"
rm "$TMPFILE"
ssh "$DEPLOY_HOST" 'cd /srv/ohm && cat /tmp/seed-admin.sql | docker compose exec -T postgres psql -U ohm ohm_production && rm /tmp/seed-admin.sql'
"""
