      #           body,
      #         });
      #       }

  migrations:
    name: Migrations tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ohm_migrations
          POSTGRES_USER: ohm
          POSTGRES_PASSWORD: ohm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ohm:ohm@localhost:5432/ohm_migrations?sslmode=disable
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Migrate up
        run: buffalo pop migrate --path ../db/migrations
      - name: Migrate down
        run: buffalo pop migrate down --path ../db/migrations --step $(ls ../db/migrations/*.up.sql | wc -l | tr -d ' ')
      - name: Migrate up again
        run: buffalo pop migrate --path ../db/migrations
