name: CI

on:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/golangci-lint
          key: ${{ runner.os }}-lint-${{ hashFiles('webapp/go.sum', 'webapp/.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-lint-
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Lint
        run: golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('webapp/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          GO_ENV: test
      - name: Coverage summary
        run: go tool cover -func=coverage.out
      - name: Coverage report
        run: go tool cover -html=coverage.out -o coverage.html
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            webapp/coverage.out
            webapp/coverage.html

  migrations:
    name: Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ohm_migrations
          POSTGRES_USER: ohm
          POSTGRES_PASSWORD: ohm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ohm:ohm@localhost:5432/ohm_migrations?sslmode=disable
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Migrate up
        run: buffalo pop migrate --path ../db/migrations
      - name: Migrate down
        run: buffalo pop migrate down --path ../db/migrations --step $(ls ../db/migrations/*.up.sql | wc -l | tr -d ' ')
      - name: Migrate up again
        run: buffalo pop migrate --path ../db/migrations
