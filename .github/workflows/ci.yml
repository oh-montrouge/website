name: CI

on:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/golangci-lint
          key: ${{ runner.os }}-lint-${{ hashFiles('webapp/go.sum', 'webapp/.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-lint-
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Lint
        run: golangci-lint run ./...

  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('webapp/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          GO_ENV: test
      - name: Coverage summary
        run: go tool cover -func=coverage.out
      - name: Coverage report
        run: go tool cover -html=coverage.out -o coverage.html
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            webapp/coverage.out
            webapp/coverage.html

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-e2e-${{ hashFiles('webapp/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-e2e-

      - uses: actions/cache@v4
        with:
          path: |
            e2e/node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-e2e-npm-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-e2e-npm-

      - uses: jdx/mise-action@v2

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: e2e

      # ── Playwright (globalSetup: migrations, seed, build, start binary) ──────
      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:3000

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/

      # ── E2e coverage ─────────────────────────────────────────────────────────
      - name: Convert e2e coverage
        working-directory: webapp
        run: go tool covdata textfmt -i ../coverage/e2e -o ../coverage/e2e.out

      - name: Compute e2e coverage
        id: coverage
        working-directory: webapp
        run: |
          TOTAL=$(go tool cover -func ../coverage/e2e.out | grep "^total" | awk '{print $3}')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "E2e coverage: $TOTAL"

      # ── Post coverage comment on PR ───────────────────────────────────────────
