name: CI

on:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/golangci-lint
          key: ${{ runner.os }}-lint-${{ hashFiles('webapp/go.sum', 'webapp/.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-lint-
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Lint
        run: golangci-lint run ./...

  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('webapp/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          GO_ENV: test
      - name: Coverage summary
        run: go tool cover -func=coverage.out
      - name: Coverage report
        run: go tool cover -html=coverage.out -o coverage.html
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            webapp/coverage.out
            webapp/coverage.html

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-e2e-${{ hashFiles('webapp/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-e2e-

      - uses: actions/cache@v4
        with:
          path: |
            e2e/node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-e2e-npm-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-e2e-npm-

      - uses: jdx/mise-action@v2

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: e2e

      # ── Playwright (globalSetup: migrations, seed, build, start binary) ──────
      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:3000

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/

      # ── E2e coverage ─────────────────────────────────────────────────────────
      - name: Convert e2e coverage
        working-directory: webapp
        run: go tool covdata textfmt -i ../coverage/e2e -o ../coverage/e2e.out

      - name: Compute e2e coverage
        id: coverage
        working-directory: webapp
        run: |
          TOTAL=$(go tool cover -func ../coverage/e2e.out | grep "^total" | awk '{print $3}')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "E2e coverage: $TOTAL"

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: coverage/e2e.out

  coverage-comment:
    name: Coverage comment
    needs: [test, e2e]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/unit
      - uses: actions/download-artifact@v4
        with:
          name: coverage-e2e
          path: coverage/e2e
      - name: Merge and compute coverage
        id: coverage
        working-directory: webapp
        run: |
          go tool gocovmerge ../coverage/unit/coverage.out ../coverage/e2e/e2e.out > ../coverage/merged.out
          TOTAL=$(go tool cover -func ../coverage/merged.out | grep "^total" | awk '{print $3}')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          {
            echo "detail<<EOF"
            go tool cover -func ../coverage/merged.out
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Find existing coverage comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- ohm-coverage-comment -->"
      - uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- ohm-coverage-comment -->
            <details><summary>Coverage: ${{ steps.coverage.outputs.total }} (unit + e2e)</summary>

            ```
            ${{ steps.coverage.outputs.detail }}
            ```
            </details>
          edit-mode: replace

  migrations:
    name: Migrations tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ohm_migrations
          POSTGRES_USER: ohm
          POSTGRES_PASSWORD: ohm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ohm:ohm@localhost:5432/ohm_migrations?sslmode=disable
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Migrate up
        run: buffalo pop migrate --path ../db/migrations
      - name: Migrate down
        run: buffalo pop migrate down --path ../db/migrations --step $(ls ../db/migrations/*.up.sql | wc -l | tr -d ' ')
      - name: Migrate up again
        run: buffalo pop migrate --path ../db/migrations
