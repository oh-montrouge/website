pre-commit:
  parallel: true
  commands:
    format:
      glob: "webapp/**/*.go"
      root: webapp
      run: test -z "$(gofmt -l .)"
      fail_text: "Go files need formatting — run: gofmt -w . from webapp/"
    vet:
      glob: "webapp/**/*.go"
      root: webapp
      run: go vet ./...
    lint:
      glob: "webapp/**/*.go"
      root: webapp
      run: golangci-lint run ./...
    tidy:
      glob: "webapp/go.{mod,sum}"
      root: webapp
      run: go mod tidy && git diff --exit-code go.mod go.sum
      fail_text: "go.mod/go.sum out of sync — run: go mod tidy from webapp/"

pre-push:
  commands:
    no-main-push:
      run: |
        current=$(git branch --show-current)
        if [ "$current" = "main" ]; then
          echo "Direct push to main is not allowed. Use a pull request."
          exit 1
        fi

commit-msg:
  commands:
    conventional:
      run: "grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\(.+\\))?(!)?: .+' {1}"
      fail_text: "Commit message must follow Conventional Commits — e.g. feat(auth): add login handler"
