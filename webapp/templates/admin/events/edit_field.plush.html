<div class="page-shell">
    <div class="page-shell__header">
        <div>
            <nav aria-label="fil d'Ariane" class="breadcrumb">
                <a href="/admin/">Administration</a>
                <span class="breadcrumb__sep">›</span>
                <a href="/admin/evenements">Événements</a>
                <span class="breadcrumb__sep">›</span>
                <a href="/admin/evenements/<%= eventID %>/modifier">Modifier l'événement</a>
                <span class="breadcrumb__sep">›</span>
                <span>Modifier le champ</span>
            </nav>
            <h1>Modifier le champ</h1>
        </div>
    </div>

    <section class="card" style="max-width:560px"
             x-data="{ fieldType: '<%= field.FieldType %>', choices: [<%= for (ch) in field.Choices { %>{ id: <%= ch.ID %>, label: '<%= ch.Label %>', position: <%= ch.Position %> },<% } %>] }">
        <div class="card__body">
            <%= if (formError != "") { %>
            <div class="alert alert--danger" role="alert" style="margin-bottom:var(--sp-4)"><%= formError %></div>
            <% } %>

            <form action="/admin/evenements/<%= eventID %>/champs/<%= field.ID %>" method="post">
                <input type="hidden" name="authenticity_token" value="<%= authenticity_token %>" />
                <input type="hidden" name="_method" value="PUT" />

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);margin-bottom:var(--sp-3)">
                    <div class="field">
                        <label class="field__label" for="field-label">
                            Label <span class="req" aria-hidden="true">*</span>
                        </label>
                        <input class="input" type="text" id="field-label" name="label"
                               value="<%= field.Label %>" required aria-required="true" />
                    </div>
                    <div class="field">
                        <label class="field__label" for="field-type">Type</label>
                        <select class="input" id="field-type" name="field_type" x-model="fieldType">
                            <option value="text" <%= if (field.FieldType == "text") { %>selected<% } %>>Texte</option>
                            <option value="integer" <%= if (field.FieldType == "integer") { %>selected<% } %>>Nombre</option>
                            <option value="choice" <%= if (field.FieldType == "choice") { %>selected<% } %>>Choix</option>
                        </select>
                    </div>
                    <div class="field">
                        <label class="field__label" for="field-position">Position</label>
                        <input class="input" type="number" id="field-position" name="position"
                               value="<%= field.Position %>" min="1" />
                    </div>
                    <div class="field" style="display:flex;align-items:center;gap:var(--sp-2);padding-top:var(--sp-6)">
                        <input type="checkbox" id="field-required" name="required" value="true"
                               <%= if (field.Required) { %>checked<% } %> />
                        <label for="field-required" style="font-size:var(--fs-14)">Requis</label>
                    </div>
                </div>

                <!-- Choices (for choice type) -->
                <div x-show="fieldType === 'choice'" style="margin-bottom:var(--sp-4)">
                    <p style="font-size:var(--fs-13);font-weight:600;margin-bottom:var(--sp-2)">Options</p>
                    <template x-for="(choice, i) in choices" :key="i">
                        <div style="display:flex;gap:var(--sp-2);margin-bottom:var(--sp-2);align-items:center">
                            <input type="hidden" :name="'choice_position[]'" :value="i + 1" />
                            <input class="input" type="text" :name="'choice_label[]'" x-model="choice.label"
                                   :placeholder="'Option ' + (i + 1)" />
                            <button type="button" class="btn btn--ghost btn--sm"
                                    @click="choices.splice(i, 1)" :disabled="choices.length <= 1"
                                    aria-label="Supprimer cette option">✕</button>
                        </div>
                    </template>
                    <button type="button" class="btn btn--ghost btn--sm"
                            @click="choices.push({ label: '', position: choices.length + 1 })">+ Option</button>
                </div>

                <div style="display:flex;gap:var(--sp-3)">
                    <button type="submit" class="btn btn--primary">Enregistrer</button>
                    <a href="/admin/evenements/<%= eventID %>/modifier" class="btn btn--ghost">Annuler</a>
                </div>
            </form>
        </div>
    </section>
</div>
