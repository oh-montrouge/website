<div class="page-shell">
    <div class="page-shell__header">
        <div>
            <nav aria-label="fil d'Ariane" class="breadcrumb">
                <a href="/admin/">Administration</a>
                <span class="breadcrumb__sep">›</span>
                <a href="/admin/musiciens">Musiciens</a>
                <span class="breadcrumb__sep">›</span>
                <a href="/admin/musiciens/<%= account.ID %>"><%= profile.LastName %> <%= profile.FirstName %></a>
                <span class="breadcrumb__sep">›</span>
                <span>Modifier</span>
            </nav>
            <h1>Modifier le profil</h1>
        </div>
    </div>

    <%= if (formError != "") { %>
    <div class="alert alert--danger" role="alert" style="margin-bottom:var(--sp-4)">
        <%= formError %>
    </div>
    <% } %>

    <form action="/admin/musiciens/<%= account.ID %>" method="post" class="stack" style="--gap:var(--sp-5);max-width:480px">
        <input type="hidden" name="authenticity_token" value="<%= authenticity_token %>" />
        <input type="hidden" name="_method" value="PUT" />

        <div class="field">
            <label class="field__label" for="first_name">Prénom <span class="req" aria-hidden="true">*</span></label>
            <input class="input" type="text" id="first_name" name="first_name"
                   value="<%= profile.FirstName %>" required autocomplete="given-name" />
        </div>

        <div class="field">
            <label class="field__label" for="last_name">Nom <span class="req" aria-hidden="true">*</span></label>
            <input class="input" type="text" id="last_name" name="last_name"
                   value="<%= profile.LastName %>" required autocomplete="family-name" />
        </div>

        <div class="field">
            <label class="field__label" for="email">Adresse e-mail <span class="req" aria-hidden="true">*</span></label>
            <input class="input" type="email" id="email" name="email"
                   value="<%= account.Email %>" required autocomplete="email" />
        </div>

        <div class="field">
            <label class="field__label" for="main_instrument_id">Instrument <span class="req" aria-hidden="true">*</span></label>
            <select class="input" id="main_instrument_id" name="main_instrument_id" required>
                <%= for (i) in instruments { %>
                <option value="<%= i.ID %>" <%= if (i.ID == profile.MainInstrumentID) { %>selected<% } %>><%= i.Name %></option>
                <% } %>
            </select>
        </div>

        <div class="field">
            <label class="field__label" for="birth_date">Date de naissance</label>
            <input class="input" type="date" id="birth_date" name="birth_date"
                   value="<%= birthDateStr %>" />
        </div>

        <div class="field">
            <label class="field__label" for="parental_consent_uri">Accord parental (URL du document)</label>
            <input class="input" type="url" id="parental_consent_uri" name="parental_consent_uri"
                   value="<%= profile.ParentalConsentURI %>" placeholder="https://…" />
            <p class="field__hint">Obligatoire pour les musiciens de moins de 15 ans.</p>
        </div>

        <%= if (profile.PhoneAddressConsent) { %>
        <div class="field">
            <label class="field__label" for="phone">Téléphone</label>
            <input class="input" type="tel" id="phone" name="phone"
                   value="<%= profile.Phone %>" autocomplete="tel" />
        </div>

        <div class="field">
            <label class="field__label" for="address">Adresse postale</label>
            <textarea class="textarea" id="address" name="address" rows="3"><%= profile.Address %></textarea>
        </div>
        <% } %>

        <div style="display:flex;gap:var(--sp-3)">
            <button type="submit" class="btn btn--primary">Enregistrer</button>
            <a href="/admin/musiciens/<%= account.ID %>" class="btn btn--ghost">Annuler</a>
        </div>
    </form>
</div>
