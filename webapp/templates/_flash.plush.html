<%= for (k, messages) in flash { %>
  <%= for (msg) in messages { %>
    <div class="alert alert--<%= k %>" x-data="{ open: true }" x-show="open" style="margin:var(--sp-3) var(--sp-6) 0">
      <span style="flex:1"><%= msg %></span>
      <button class="alert__close" @click="open = false" aria-label="Fermer">✕</button>
    </div>
  <% } %>
<% } %>
