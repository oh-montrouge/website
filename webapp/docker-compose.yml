services:
  postgres:
    image: postgres:17-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ohm -d ohm_development"]
      interval: 2s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_USER: ohm
      POSTGRES_PASSWORD: ohm
      POSTGRES_DB: ohm_development
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
